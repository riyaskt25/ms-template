openapi: 3.1.0
info:
  title: MS Template API
  description: "Microservice template API exposing companies, salesmen, admin users,\
    \ RBAC (roles, privileges, role-privileges, user-roles), and external posts\
    \ endpoints."
  contact:
    name: MS Template Team
    url: https://snb.com/support
    email: support@snb.com
  license:
    name: Proprietary
    url: https://snb.com/legal
  version: v1
externalDocs:
  description: Project quick start and usage
  url: https://snb.com/docs/ms-template
servers:
- url: http://localhost:8080
  description: Local development
- url: /
  description: Relative deployment base path
tags:
- name: Companies
  description: Operations for company resources
- name: Salesmen
  description: Operations for salesman resources
- name: Posts
  description: Operations for external posts resource consumption
- name: RBAC
  description: Role-based access control operations
paths:
  /api/salesmen/{id}:
    get:
      tags:
      - Salesmen
      summary: Get salesman by id
      description: Finds a salesman by identifier.
      operationId: getSalesmanById
      parameters:
      - name: id
        in: path
        description: Salesman identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Salesman fetched successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SalesmanResponse"
              examples:
                SalesmanById:
                  description: SalesmanById
                  value:
                    salesmanId: 1
                    firstName: Ahamed
                    middleName: Ibrahim
                    lastName: Khan
                    accountNumber: ACC-9911
                    cifNumber: CIF-1022
                    idNumber: 784-1986-0000001-1
                    availableIncentiveAmount: 1250.75
                    createdBy: 1001
                    createdAt: 2026-05-04T10:15:30
                    updatedBy: 1002
                    updatedAt: 2026-05-04T11:20:45
        "400":
          description: Invalid id supplied
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                InvalidSalesmanId:
                  description: InvalidSalesmanId
                  value:
                    errors:
                    - type: VALIDATION_ERROR
                      code: INVALID_PATH_PARAM
                      message: id must be greater than 0
                      description: Path variable 'id' must be positive
        "404":
          description: Salesman not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                SalesmanNotFound:
                  description: SalesmanNotFound
                  value:
                    errors:
                    - type: NOT_FOUND
                      code: RESOURCE_NOT_FOUND
                      message: Resource not found
                      description: Salesman not found for id=999
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                InternalServerError:
                    description: DatabaseUnavailable
                    value:
                      errors:
                      - type: SERVER_ERROR
                        code: INTERNAL_ERROR
                        message: Database unavailable
                        description: Unable to connect to the database (connection refused)
    put:
      tags:
      - Salesmen
      summary: Update salesman
      description: Updates mutable salesman fields by identifier.
      operationId: updateSalesman
      parameters:
      - name: id
        in: path
        description: Salesman identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        description: Salesman payload to update
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalesmanUpdateRequest"
            examples:
              UpdateSalesman:
                description: UpdateSalesman
                value:
                  firstName: Ahamed
                  middleName: Ibrahim
                  lastName: Khan
                  accountNumber: ACC-9911
                  cifNumber: CIF-1022
                  idNumber: 784-1986-0000001-1
        required: true
      responses:
        "200":
          description: Salesman updated successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SalesmanResponse"
              examples:
                UpdatedSalesman:
                  description: UpdatedSalesman
                  value:
                    salesmanId: 1
                    firstName: Ahamed
                    middleName: Ibrahim
                    lastName: Khan
                    accountNumber: ACC-9911
                    cifNumber: CIF-1022
                    idNumber: 784-1986-0000001-1
                    availableIncentiveAmount: 1250.75
                    createdBy: 1001
                    createdAt: 2026-05-04T10:15:30
                    updatedBy: 1002
                    updatedAt: 2026-05-04T12:15:30
        "400":
          description: Validation failed or invalid id
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                SalesmanValidationError:
                  description: SalesmanValidationError
                  value:
                    errors:
                    - type: VALIDATION_ERROR
                      code: ACCOUNTNUMBER_REQUIRED
                      message: accountNumber is required
                      description: Field 'accountNumber' must not be blank
        "404":
          description: Salesman not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                SalesmanNotFound:
                  description: SalesmanNotFound
                  value:
                    errors:
                    - type: NOT_FOUND
                      code: RESOURCE_NOT_FOUND
                      message: Resource not found
                      description: Salesman not found for id=999
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                InternalServerError:
                    description: NetworkFailure
                    value:
                      errors:
                      - type: SERVER_ERROR
                        code: INTERNAL_ERROR
                        message: Network failure
                        description: Unable to reach downstream service (timeout)
    delete:
      tags:
      - Salesmen
      summary: Soft delete salesman
      description: Marks a salesman as inactive without removing the row.
      operationId: softDeleteSalesman
      parameters:
      - name: id
        in: path
        description: Salesman identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Salesman soft-deleted successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SalesmanResponse"
              examples:
                DeletedSalesman:
                  description: DeletedSalesman
                  value:
                    salesmanId: 1
                    firstName: Ahamed
                    middleName: Ibrahim
                    lastName: Khan
                    accountNumber: ACC-9911
                    cifNumber: CIF-1022
                    idNumber: 784-1986-0000001-1
                    availableIncentiveAmount: 1250.75
                    createdBy: 1001
                    createdAt: 2026-05-04T10:15:30
                    updatedBy: 1002
                    updatedAt: 2026-05-04T12:20:00
        "400":
          description: Invalid id supplied
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                InvalidSalesmanId:
                  description: InvalidSalesmanId
                  value:
                    errors:
                    - type: VALIDATION_ERROR
                      code: INVALID_PATH_PARAM
                      message: id must be greater than 0
                      description: Path variable 'id' must be positive
        "404":
          description: Salesman not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                SalesmanNotFound:
                  description: SalesmanNotFound
                  value:
                    errors:
                    - type: NOT_FOUND
                      code: RESOURCE_NOT_FOUND
                      message: Resource not found
                      description: Salesman not found for id=999
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                InternalServerError:
                    description: DiskFull
                    value:
                      errors:
                      - type: SERVER_ERROR
                        code: INTERNAL_ERROR
                        message: Disk full
                        description: Unable to write to disk (no space left on device)
  /api/companies/{id}:
    get:
      tags:
      - Companies
      summary: Get company by id
      description: Finds a single company by its identifier.
      operationId: getCompanyById
      parameters:
      - name: id
        in: path
        description: Company identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - name: includeSalesmen
        in: query
        description: Set true to include associated salesmen for this company. Defaults
          to false.
        required: false
        schema:
          type: boolean
          default: false
        example: false
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Company fetched successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CompanyResponse"
              examples:
                CompanyById:
                  description: CompanyById
                  value:
                    companyId: 1
                    emailAddress: company@example.com
                    mobileNumber: "+971555010101"
                    registrationNumber: REG-2026-0001
                    companyStatus: ACTIVE
                    companyType: STANDARD
                    createdBy: 1001
                    createdAt: 2026-05-04T10:15:30
                    updatedBy: 1002
                    updatedAt: 2026-05-04T11:20:45
        "400":
          description: Invalid company id supplied
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                InvalidCompanyId:
                  description: InvalidCompanyId
                  value:
                    errors:
                    - type: VALIDATION_ERROR
                      code: INVALID_PATH_PARAM
                      message: id must be greater than 0
                      description: Path variable 'id' must be positive
        "404":
          description: Company not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                CompanyNotFound:
                  description: CompanyNotFound
                  value:
                    errors:
                    - type: NOT_FOUND
                      code: RESOURCE_NOT_FOUND
                      message: Resource not found
                      description: Company not found for id=999
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                InternalServerError:
                    description: ServiceDependencyFailure
                    value:
                      errors:
                      - type: SERVER_ERROR
                        code: INTERNAL_ERROR
                        message: Service dependency failure
                        description: Failed to update company due to unavailable email service
    put:
      tags:
      - Companies
      summary: Update company
      description: Updates an existing company record by identifier.
      operationId: updateCompany
      parameters:
      - name: id
        in: path
        description: Company identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        description: Company payload to update
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdateRequest"
            examples:
              UpdateCompany:
                description: UpdateCompany
                value:
                  registrationNumber: REG-2026-0001
                  emailAddress: company.updated@example.com
                  mobileNumber: "+971555010102"
        required: true
      responses:
        "200":
          description: Company updated successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CompanyWriteResponse"
              examples:
                UpdatedCompany:
                  description: UpdatedCompany
                  value:
                    companyId: 1
                    emailAddress: company.updated@example.com
                    mobileNumber: "+971555010102"
                    registrationNumber: REG-2026-0001
                    companyStatus: ACTIVE
                    companyType: STANDARD
                    createdBy: 1001
                    createdAt: 2026-05-04T10:15:30
                    updatedBy: 1002
                    updatedAt: 2026-05-04T12:15:30
        "400":
          description: Validation failed or invalid id
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                CompanyValidationError:
                  description: CompanyValidationError
                  value:
                    errors:
                    - type: VALIDATION_ERROR
                      code: EMAILADDRESS_INVALID
                      message: emailAddress must be a valid email
                      description: Rejected value: company.updated
        "404":
          description: Company not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                CompanyNotFound:
                  description: CompanyNotFound
                  value:
                    errors:
                    - type: NOT_FOUND
                      code: RESOURCE_NOT_FOUND
                      message: Resource not found
                      description: Company not found for id=999
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                InternalServerError:
                    description: PermissionSystemFailure
                    value:
                      errors:
                      - type: SERVER_ERROR
                        code: INTERNAL_ERROR
                        message: Permission system failure
                        description: Unable to verify user permissions due to authorization service outage
    delete:
      tags:
      - Companies
      summary: Soft delete company
      description: Marks a company record as inactive without physical deletion.
      operationId: softDeleteCompany
      parameters:
      - name: id
        in: path
        description: Company identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Company soft-deleted successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CompanyWriteResponse"
              examples:
                DeletedCompany:
                  description: DeletedCompany
                  value:
                    companyId: 1
                    emailAddress: company.updated@example.com
                    mobileNumber: "+971555010102"
                    registrationNumber: REG-2026-0001
                    companyStatus: INACTIVE
                    companyType: STANDARD
                    createdBy: 1001
                    createdAt: 2026-05-04T10:15:30
                    updatedBy: 1002
                    updatedAt: 2026-05-04T12:20:00
        "400":
          description: Invalid company id supplied
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                InvalidCompanyId:
                  description: InvalidCompanyId
                  value:
                    errors:
                    - type: VALIDATION_ERROR
                      code: INVALID_PATH_PARAM
                      message: id must be greater than 0
                      description: Path variable 'id' must be positive
        "404":
          description: Company not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                CompanyNotFound:
                  description: CompanyNotFound
                  value:
                    errors:
                    - type: NOT_FOUND
                      code: RESOURCE_NOT_FOUND
                      message: Resource not found
                      description: Company not found for id=999
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                InternalServerError:
                    description: AuthProviderFailure
                    value:
                      errors:
                      - type: SERVER_ERROR
                        code: INTERNAL_ERROR
                        message: Authentication provider failure
                        description: Unable to authenticate user due to external auth provider timeout
  /api/admin-users/{id}:
    get:
      tags:
      - RBAC
      summary: Get admin user by id
      description: Finds an admin user by identifier.
      operationId: getAdminUserById
      parameters:
      - name: id
        in: path
        description: Admin user identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Admin user fetched successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AdminUserResponse"
              examples:
                AdminUserById:
                  description: AdminUserById
                  value:
                    adminUserId: 1
                    firstName: Sara
                    middleName: M
                    lastName: Naseer
                    extensionNumber: EXT-1001
                    emailAddress: sara.naseer@example.com
                    mobileNumber: "+971555010301"
                    createdBy: 1001
                    createdAt: 2026-05-04T10:15:30
                    updatedBy: 1002
                    updatedAt: 2026-05-04T11:20:45
        "400":
          description: Invalid id supplied
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                InvalidAdminUserId:
                  description: InvalidAdminUserId
                  value:
                    errors:
                    - type: VALIDATION_ERROR
                      code: INVALID_PATH_PARAM
                      message: id must be greater than 0
                      description: Path variable 'id' must be positive
        "404":
          description: Admin user not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                AdminUserNotFound:
                  description: AdminUserNotFound
