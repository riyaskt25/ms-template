                    errors:
                    - type: NOT_FOUND
                      code: RESOURCE_NOT_FOUND
                      message: Resource not found
                      description: Admin user not found for id=999
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                InternalServerError:
                  description: InternalServerError
                  value:
                    errors:
                    - type: SERVER_ERROR
                      code: INTERNAL_ERROR
                      message: Unexpected internal server error
                      description: null
    put:
      tags:
      - RBAC
      summary: Update admin user
      description: Updates an existing admin user by identifier.
      operationId: updateAdminUser
      parameters:
      - name: id
        in: path
        description: Admin user identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        description: Admin user payload to update
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserUpdateRequest"
            examples:
              UpdateAdminUser:
                description: UpdateAdminUser
                value:
                  firstName: Sara
                  middleName: Mariam
                  lastName: Naseer
                  extensionNumber: EXT-1002
                  emailAddress: sara.naseer@example.com
                  mobileNumber: "+971555010302"
        required: true
      responses:
        "200":
          description: Admin user updated successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AdminUserResponse"
        "400":
          description: Validation failed or invalid id
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "404":
          description: Admin user not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AdminUserResponse"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
    delete:
      tags:
      - RBAC
      summary: Soft delete admin user
      description: Marks an admin user as inactive without deleting the record physically.
      operationId: softDeleteAdminUser
      parameters:
      - name: id
        in: path
        description: Admin user identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Admin user soft-deleted successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AdminUserResponse"
        "400":
          description: Invalid id supplied
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "404":
          description: Admin user not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AdminUserResponse"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
  /api/salesmen:
    get:
      tags:
      - Salesmen
      summary: List salesmen
      description: Returns all active salesman records.
      operationId: getAllSalesmen
      parameters:
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Salesmen fetched successfully
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesmanResponse"
              examples:
                SalesmenList:
                  description: SalesmenList
                  value:
                  - salesmanId: 1
                    firstName: Ahamed
                    middleName: I
                    lastName: Khan
                    accountNumber: ACC-9911
                    cifNumber: CIF-1022
                    idNumber: 784-1986-0000001-1
                    availableIncentiveAmount: 1250.75
                  - salesmanId: 2
                    firstName: Omar
                    middleName: S
                    lastName: Rahman
                    accountNumber: ACC-9912
                    cifNumber: CIF-1023
                    idNumber: 784-1989-0000002-2
                    availableIncentiveAmount: 980.0
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                InternalServerError:
                  description: InternalServerError
                  value:
                    errors:
                    - type: SERVER_ERROR
                      code: INTERNAL_ERROR
                      message: Unexpected internal server error
                      description: null
    post:
      tags:
      - Salesmen
      summary: Create salesman
      description: Creates a salesman and links the record with a company and internal
        user profile.
      operationId: createSalesman
      parameters:
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        description: Salesman payload to create
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalesmanCreateRequest"
            examples:
              CreateSalesman:
                description: CreateSalesman
                value:
                  firstName: Ahamed
                  middleName: I
                  lastName: Khan
                  accountNumber: ACC-9911
                  cifNumber: CIF-1022
                  idNumber: 784-1986-0000001-1
                  companyId: 1
                  emailAddress: ahamed.khan@example.com
                  mobileNumber: "+971555010201"
        required: true
      responses:
        "201":
          description: Salesman created successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SalesmanResponse"
              examples:
                CreatedSalesman:
                  description: CreatedSalesman
                  value:
                    salesmanId: 3
                    firstName: Ahamed
                    middleName: I
                    lastName: Khan
                    accountNumber: ACC-9911
                    cifNumber: CIF-1022
                    idNumber: 784-1986-0000001-1
                    availableIncentiveAmount: 0
                    createdBy: 1001
                    createdAt: 2026-05-04T10:15:30
                    updatedBy: 1001
                    updatedAt: 2026-05-04T10:15:30
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                ValidationError:
                  description: ValidationError
                  value:
                    errors:
                    - type: VALIDATION_ERROR
                      code: FIRSTNAME_REQUIRED
                      message: firstName is required
                      description: Field 'firstName' must not be blank
        "404":
          description: Company reference not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                CompanyNotFound:
                  description: CompanyNotFound
                  value:
                    errors:
                    - type: NOT_FOUND
                      code: RESOURCE_NOT_FOUND
                      message: Resource not found
                      description: Company not found for id=999
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                InternalServerError:
                  description: InternalServerError
                  value:
                    errors:
                    - type: SERVER_ERROR
                      code: INTERNAL_ERROR
                      message: Unexpected internal server error
                      description: null
  /api/companies:
    get:
      tags:
      - Companies
      summary: List companies (offset pagination)
      description: Returns active company records using offset-based pagination. Best
        for small to medium datasets or when random access to pages is needed.
      operationId: getAllCompanies
      parameters:
      - name: page
        in: query
        description: Zero-based page index
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
        example: 0
      - name: size
        in: query
        description: Page size (max 200)
        required: false
        schema:
          type: integer
          format: int32
          exclusiveMinimum: 0
          maximum: 200
        example: 20
      - name: sortBy
        in: query
        description: "Sort fields (comma-separated). Defaults to companyId ASC when\
