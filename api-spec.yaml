                  description: CompanyLazySlice
                  value:
                    data:
                    - companyId: 1
                      emailAddress: company@example.com
                      mobileNumber: "+971555010101"
                      registrationNumber: REG-2026-0001
                      companyStatus: ACTIVE
                      companyType: STANDARD
                    lazyLoading:
                      limit: 20
                      hasNext: true
                      nextCursor: eyJjb21wYW55SWQiOiIxMjAifQ
        "400":
          description: Invalid cursor token or parameters
          content:
            '*/*':
              schema:
