          example: 2026-05-04T11:20:45
        salesmen:
          type: array
          description: Associated salesmen (only when includeSalesmen=true is requested)
          items:
            $ref: "#/components/schemas/SalesmanResponse"
    LazyLoadingMeta:
      type: object
      description: Cursor metadata for lazy loading
      properties:
        limit:
          type: integer
          format: int32
          description: Requested lazy-loading limit
          example: 20
        hasNext:
          type: boolean
          description: Whether more items are available
          example: true
        nextCursor:
          type: string
          description: Opaque cursor token to request the next slice
          example: eyJjb21wYW55SWQiOiIxMjAifQ
    PaginationMeta:
      type: object
      description: Pagination metadata
      properties:
        page:
          type: integer
          format: int32
          description: Zero-based page index
          example: 0
        size:
          type: integer
          format: int32
          description: Requested page size
          example: 10
        numberOfElements:
          type: integer
          format: int32
          description: Number of elements in current page
          example: 7
        totalElements:
          type: integer
          format: int64
          description: Total number of matching elements
          example: 57
        totalPages:
          type: integer
          format: int32
          description: Total number of pages
          example: 6
        first:
          type: boolean
          description: Whether this page is the first page
          example: true
        last:
          type: boolean
          description: Whether this page is the last page
          example: false
        hasNext:
          type: boolean
          description: Whether there is a next page
          example: true
        hasPrevious:
          type: boolean
          description: Whether there is a previous page
          example: false
        sorted:
          type: boolean
          description: Whether any sorting is applied
          example: true
        sort:
          type: array
          items:
            type: string
  parameters:
    XRequestIdHeader:
      name: X-Request-Id
      in: header
      description: "Correlation identifier for distributed tracing. If omitted, the\
        \ service generates one."
      required: false
      schema:
        type: string
        example: req-20260504-0001
    XTenantIdHeader:
      name: X-Tenant-Id
      in: header
      description: Tenant identifier used for multi-tenant context propagation.
      required: false
      schema:
        type: string
        example: tenant-001
    AcceptLanguageHeader:
      name: Accept-Language
      in: header
      description: Preferred locale for localized validation and error messages.
      required: false
      schema:
        type: string
        example: en
