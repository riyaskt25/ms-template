openapi: 3.1.0
info:
  title: MS Template API
  description: "Microservice template API exposing company, salesman, admin user,\
    \ and external posts endpoints. All endpoints support request context propagation\
    \ using X-Request-Id, X-Tenant-Id, and Accept-Language headers."
  contact:
    name: MS Template Team
    url: https://snb.com/support
    email: support@snb.com
  license:
    name: Proprietary
    url: https://snb.com/legal
  version: v1
externalDocs:
  description: Project quick start and usage
  url: https://snb.com/docs/ms-template
servers:
- url: http://localhost:8080
  description: Local development
- url: /
  description: Relative deployment base path
tags:
- name: Companies
  description: Operations for company resources
- name: Salesmen
  description: Operations for salesman resources
- name: Posts
  description: Operations for external posts resource consumption
- name: Admin Users
  description: Operations for admin user resources
paths:
  /api/salesmen/{id}:
    get:
      tags:
      - Salesmen
      summary: Get salesman by id
      description: Finds a salesman by identifier.
      operationId: getSalesmanById
      parameters:
      - name: id
        in: path
        description: Salesman identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Salesman fetched successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SalesmanResponse"
        "400":
          description: Invalid id supplied
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "404":
          description: Salesman not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SalesmanResponse"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
    put:
      tags:
      - Salesmen
      summary: Update salesman
      description: Updates mutable salesman fields by identifier.
      operationId: updateSalesman
      parameters:
      - name: id
        in: path
        description: Salesman identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        description: Salesman payload to update
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalesmanUpdateRequest"
            examples:
              UpdateSalesman:
                description: UpdateSalesman
                value:
                  firstName: Ahamed
                  middleName: Ibrahim
                  lastName: Khan
                  accountNumber: ACC-9911
                  cifNumber: CIF-1022
                  idNumber: 784-1986-0000001-1
        required: true
      responses:
        "200":
          description: Salesman updated successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SalesmanResponse"
        "400":
          description: Validation failed or invalid id
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "404":
          description: Salesman not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SalesmanResponse"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
    delete:
      tags:
      - Salesmen
      summary: Soft delete salesman
      description: Marks a salesman as inactive without removing the row.
      operationId: softDeleteSalesman
      parameters:
      - name: id
        in: path
        description: Salesman identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Salesman soft-deleted successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SalesmanResponse"
        "400":
          description: Invalid id supplied
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "404":
          description: Salesman not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SalesmanResponse"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
  /api/companies/{id}:
    get:
      tags:
      - Companies
      summary: Get company by id
      description: Finds a single company by its identifier.
      operationId: getCompanyById
      parameters:
      - name: id
        in: path
        description: Company identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - name: includeSalesmen
        in: query
        description: Set true to include associated salesmen for this company. Defaults
          to false.
        required: false
        schema:
          type: boolean
          default: false
        example: false
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Company fetched successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CompanyResponse"
        "400":
          description: Invalid company id supplied
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "404":
          description: Company not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                CompanyNotFound:
                  description: CompanyNotFound
                  value:
                    errors:
                    - type: NOT_FOUND
                      code: RESOURCE_NOT_FOUND
                      message: Resource not found
                      description: Company not found for id=999
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
              examples:
                InternalServerError:
                  description: InternalServerError
                  value:
                    errors:
                    - type: SERVER_ERROR
                      code: INTERNAL_ERROR
                      message: Unexpected internal server error
                      description: null
    put:
      tags:
      - Companies
      summary: Update company
      description: Updates an existing company record by identifier.
      operationId: updateCompany
      parameters:
      - name: id
        in: path
        description: Company identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        description: Company payload to update
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdateRequest"
            examples:
              UpdateCompany:
                description: UpdateCompany
                value:
                  registrationNumber: REG-2026-0001
                  emailAddress: company.updated@example.com
                  mobileNumber: "+971555010102"
        required: true
      responses:
        "200":
          description: Company updated successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CompanyWriteResponse"
        "400":
          description: Validation failed or invalid id
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "404":
          description: Company not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
    delete:
      tags:
      - Companies
      summary: Soft delete company
      description: Marks a company record as inactive without physical deletion.
      operationId: softDeleteCompany
      parameters:
      - name: id
        in: path
        description: Company identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Company soft-deleted successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CompanyWriteResponse"
        "400":
          description: Invalid company id supplied
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "404":
          description: Company not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
  /api/admin-users/{id}:
    get:
      tags:
      - Admin Users
      summary: Get admin user by id
      description: Finds an admin user by identifier.
      operationId: getAdminUserById
      parameters:
      - name: id
        in: path
        description: Admin user identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Admin user fetched successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AdminUserResponse"
        "400":
          description: Invalid id supplied
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "404":
          description: Admin user not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AdminUserResponse"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
    put:
      tags:
      - Admin Users
      summary: Update admin user
      description: Updates an existing admin user by identifier.
      operationId: updateAdminUser
      parameters:
      - name: id
        in: path
        description: Admin user identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        description: Admin user payload to update
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserUpdateRequest"
            examples:
              UpdateAdminUser:
                description: UpdateAdminUser
                value:
                  firstName: Sara
                  middleName: Mariam
                  lastName: Naseer
                  extensionNumber: EXT-1002
                  emailAddress: sara.naseer@example.com
                  mobileNumber: "+971555010302"
        required: true
      responses:
        "200":
          description: Admin user updated successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AdminUserResponse"
        "400":
          description: Validation failed or invalid id
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "404":
          description: Admin user not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AdminUserResponse"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
    delete:
      tags:
      - Admin Users
      summary: Soft delete admin user
      description: Marks an admin user as inactive without deleting the record physically.
      operationId: softDeleteAdminUser
      parameters:
      - name: id
        in: path
        description: Admin user identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Admin user soft-deleted successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AdminUserResponse"
        "400":
          description: Invalid id supplied
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "404":
          description: Admin user not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AdminUserResponse"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
  /api/salesmen:
    get:
      tags:
      - Salesmen
      summary: List salesmen
      description: Returns all active salesman records.
      operationId: getAllSalesmen
      parameters:
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Salesmen fetched successfully
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesmanResponse"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
    post:
      tags:
      - Salesmen
      summary: Create salesman
      description: Creates a salesman and links the record with a company and internal
        user profile.
      operationId: createSalesman
      parameters:
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        description: Salesman payload to create
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalesmanCreateRequest"
            examples:
              CreateSalesman:
                description: CreateSalesman
                value:
                  firstName: Ahamed
                  middleName: I
                  lastName: Khan
                  accountNumber: ACC-9911
                  cifNumber: CIF-1022
                  idNumber: 784-1986-0000001-1
                  companyId: 1
                  emailAddress: ahamed.khan@example.com
                  mobileNumber: "+971555010201"
        required: true
      responses:
        "201":
          description: Salesman created successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SalesmanResponse"
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "404":
          description: Company reference not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
  /api/companies:
    get:
      tags:
      - Companies
      summary: List companies (offset pagination)
      description: Returns active company records using offset-based pagination. Best
        for small to medium datasets or when random access to pages is needed.
      operationId: getAllCompanies
      parameters:
      - name: registrationNumber
        in: query
        description: Optional registration number contains filter
        required: false
        schema:
          type: string
        example: REG-2026
      - name: companyStatus
        in: query
        description: Optional company status contains filter
        required: false
        schema:
          type: string
        example: ACTIVE
      - name: companyType
        in: query
        description: Optional company type contains filter
        required: false
        schema:
          type: string
        example: DEALER
      - name: emailAddress
        in: query
        description: Optional email contains filter
        required: false
        schema:
          type: string
        example: company@example.com
      - name: mobileNumber
        in: query
        description: Optional mobile contains filter
        required: false
        schema:
          type: string
        example: "+971555"
      - name: includeSalesmen
        in: query
        description: Set true to include associated salesmen in each company. Defaults
          to false.
        required: false
        schema:
          type: boolean
          default: false
          description: Set true to include associated salesmen in each company response.
            Defaults to false.
          example: false
        example: false
      - name: page
        in: query
        description: Zero-based page index
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
        example: 0
      - name: size
        in: query
        description: Page size (max 200)
        required: false
        schema:
          type: integer
          format: int32
          exclusiveMinimum: 0
          maximum: 200
        example: 20
      - name: sortBy
        in: query
        description: "Sort fields (comma-separated). Defaults to companyId ASC when\
          \ omitted. Allowed fields: companyId, registrationNumber, companyStatus,\
          \ companyType, emailAddress, mobileNumber, createdAt, updatedAt."
        required: false
        schema:
          type: string
        example: "companyStatus,registrationNumber"
      - name: sortDirection
        in: query
        description: "Sort directions. Provide a single value (e.g. DESC) to apply\
          \ to all sortBy fields, or comma-separated values matching the sortBy count.\
          \ Allowed values: ASC, DESC. Defaults to ASC when omitted."
        required: false
        schema:
          type: string
        example: "ASC,DESC"
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int32
          exclusiveMinimum: 0
          maximum: 200
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: select
        in: query
        required: false
        schema:
          type: string
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Companies fetched successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CompanyPageResponse"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
    post:
      tags:
      - Companies
      summary: Create company
      description: Creates a new company record and provisions the linked internal
        user.
      operationId: createCompany
      parameters:
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        description: Company payload to create
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyCreateRequest"
            examples:
              CreateCompany:
                description: CreateCompany
                value:
                  registrationNumber: REG-2026-0001
                  emailAddress: company@example.com
                  mobileNumber: "+971555010101"
        required: true
      responses:
        "201":
          description: Company created successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CompanyWriteResponse"
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "409":
          description: Duplicate registration number or conflicting data
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
  /api/admin-users:
    get:
      tags:
      - Admin Users
      summary: List admin users
      description: Returns all active admin user records.
      operationId: getAllAdminUsers
      parameters:
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Admin users fetched successfully
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUserResponse"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
    post:
      tags:
      - Admin Users
      summary: Create admin user
      description: Creates an admin user record and provisions the linked internal
        user profile.
      operationId: createAdminUser
      parameters:
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        description: Admin user payload to create
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserCreateRequest"
            examples:
              CreateAdminUser:
                description: CreateAdminUser
                value:
                  firstName: Sara
                  middleName: M
                  lastName: Naseer
                  extensionNumber: EXT-1001
                  emailAddress: sara.naseer@example.com
                  mobileNumber: "+971555010301"
        required: true
      responses:
        "201":
          description: Admin user created successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AdminUserResponse"
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
  /api/companies/{id}/status:
    patch:
      tags:
      - Companies
      summary: Decide company status
      description: Allows administrator to decide a pending company as ACTIVE or REJECTED.
      operationId: decideCompanyStatus
      parameters:
      - name: id
        in: path
        description: Company identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        description: Status decision payload
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyStatusDecisionRequest"
            examples:
              DecideCompanyStatus:
                description: DecideCompanyStatus
                value:
                  status: ACTIVE
        required: true
      responses:
        "200":
          description: Company status updated successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CompanyWriteResponse"
        "400":
          description: Invalid status value or transition
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "404":
          description: Company not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
  /favicon.ico:
    get:
      tags:
      - favicon-controller
      operationId: favicon
      responses:
        "200":
          description: OK
  /api/posts:
    get:
      tags:
      - Posts
      summary: List external posts
      description: "Fetches posts from the configured external provider (default:\
        \ JSONPlaceholder)."
      operationId: getAllExternalPosts
      parameters:
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Posts fetched successfully
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PostDto"
        "502":
          description: Upstream provider call failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
  /api/posts/{id}:
    get:
      tags:
      - Posts
      summary: Get external post by id
      description: Fetches one external post by identifier from the configured provider.
      operationId: getExternalPostById
      parameters:
      - name: id
        in: path
        description: External post identifier
        required: true
        schema:
          type: integer
          format: int64
          exclusiveMinimum: 0
        example: 1
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Post fetched successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PostDto"
        "404":
          description: Post not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PostDto"
        "502":
          description: Upstream provider call failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
  /api/companies/lazy:
    get:
      tags:
      - Companies
      summary: List companies (lazy loading with cursor)
      description: "Returns active company records using cursor-based lazy loading.\
        \ Recommended for large datasets or continuous scrolling. Provides efficient,\
        \ deterministic pagination."
      operationId: getAllCompaniesCursor
      parameters:
      - name: registrationNumber
        in: query
        description: Optional registration number contains filter
        required: false
        schema:
          type: string
        example: REG-2026
      - name: companyStatus
        in: query
        description: Optional company status contains filter
        required: false
        schema:
          type: string
        example: ACTIVE
      - name: companyType
        in: query
        description: Optional company type contains filter
        required: false
        schema:
          type: string
        example: DEALER
      - name: emailAddress
        in: query
        description: Optional email contains filter
        required: false
        schema:
          type: string
        example: company@example.com
      - name: mobileNumber
        in: query
        description: Optional mobile contains filter
        required: false
        schema:
          type: string
        example: "+971555"
      - name: includeSalesmen
        in: query
        description: Set true to include associated salesmen in each company. Defaults
          to false.
        required: false
        schema:
          type: boolean
          default: false
          description: Set true to include associated salesmen in each company response.
            Defaults to false.
          example: false
        example: false
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          exclusiveMinimum: 0
          maximum: 200
      - name: sortBy
        in: query
        description: "Sort fields (comma-separated). Defaults to companyId ASC when\
          \ omitted. companyId is always appended as tie-breaker when missing. Allowed\
          \ fields: companyId, registrationNumber, companyStatus, companyType, emailAddress,\
          \ mobileNumber, createdAt, updatedAt."
        required: false
        schema:
          type: string
        example: "companyStatus,registrationNumber"
      - name: sortDirection
        in: query
        description: "Sort directions. Provide a single value (e.g. DESC) to apply\
          \ to all sortBy fields, or comma-separated values matching the sortBy count.\
          \ Allowed values: ASC, DESC. Defaults to ASC when omitted."
        required: false
        schema:
          type: string
        example: "ASC,DESC"
      - name: limit
        in: query
        description: Lazy-loading batch size (max 200)
        required: false
        schema:
          type: integer
          format: int32
          exclusiveMinimum: 0
          maximum: 200
        example: 20
      - name: cursor
        in: query
        description: Opaque cursor token from previous response's lazyLoading.nextCursor.
          Omit for first request.
        required: false
        schema:
          type: string
        example: eyJjb21wYW55SWQiOiIxMjAifQ
      - name: select
        in: query
        required: false
        schema:
          type: string
      - $ref: "#/components/parameters/XRequestIdHeader"
      - $ref: "#/components/parameters/XTenantIdHeader"
      - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Companies fetched successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CompanyPageResponse"
        "400":
          description: Invalid cursor token or parameters
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BaseResponseDTO"
