spring:
  application:
    name: ms-template

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      schema-locations: classpath:db.sql
      data-locations: classpath:data.sql
      mode: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%X{requestId}] [%X{tenantId}] [%X{userId}] [%X{language}] %logger{36} - %msg%n"
  level:
    com.snb.ms: DEBUG
    org.springframework.web: INFO

app:
  logging:
    request-boundary-enabled: true
